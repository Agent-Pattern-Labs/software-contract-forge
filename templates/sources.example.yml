sources:
  - name: manual
    type: inbox
    enabled: true
    notes: Paste leads into data/pipeline.md.
  - name: weworkremotely-programming
    type: public-rss
    adapter: rss
    enabled: false
    url: https://weworkremotely.com/categories/remote-programming-jobs.rss
    include_keywords:
      - contract
      - freelance
      - consultant
      - full stack
      - backend
      - frontend
      - react
      - angular
      - node
      - python
      - typescript
      - ai
    exclude_keywords:
      - unpaid
      - internship
      - onsite only
    min_score: 2
    limit: 10
    notes: Public RSS feed; review employment type before applying.
  - name: remoteok
    type: public-api
    adapter: remoteok
    enabled: false
    url: https://remoteok.com/api
    include_keywords:
      - contract
      - freelance
      - consultant
      - software
      - developer
      - full stack
      - react
      - node
      - python
      - typescript
      - ai
    exclude_keywords:
      - unpaid
      - internship
      - marketing manager
      - customer support
    min_score: 2
    limit: 10
    notes: Public API source; keep Remote OK attribution/link when publishing externally.
  - name: example-greenhouse-board
    type: ats-public
    adapter: greenhouse
    enabled: false
    board: example-company
    default_buyer: Example Company
    include_keywords:
      - contract
      - consultant
      - software
      - developer
      - full stack
      - node
      - python
      - ai
    exclude_keywords:
      - unpaid
      - internship
      - onsite only
    min_score: 2
    require_contract_signal: false
    limit: 10
    notes: Public Greenhouse board API; use the board token from job-boards.greenhouse.io/<board>.
  - name: example-lever-board
    type: ats-public
    adapter: lever
    enabled: false
    company: example-company
    default_buyer: Example Company
    include_keywords:
      - contract
      - consultant
      - software
      - developer
      - full stack
      - node
      - python
      - ai
    exclude_keywords:
      - unpaid
      - internship
      - onsite only
    min_score: 2
    require_contract_signal: false
    limit: 10
    notes: Public Lever postings API; use the company slug from jobs.lever.co/<company>.
  - name: example-ashby-board
    type: ats-public
    adapter: ashby
    enabled: false
    organization: example-company
    default_buyer: Example Company
    include_keywords:
      - contract
      - consultant
      - software
      - developer
      - full stack
      - node
      - python
      - ai
    exclude_keywords:
      - unpaid
      - internship
      - onsite only
    min_score: 2
    require_contract_signal: false
    limit: 10
    notes: Public Ashby job-board API; use the organization slug from jobs.ashbyhq.com/<organization>.
  - name: example-company-careers
    type: company-careers
    adapter: public-html
    enabled: false
    urls:
      - https://example.com/careers
    default_buyer: Example Company
    crawl_links: true
    same_origin: true
    max_pages: 10
    include_keywords:
      - contract
      - consultant
      - software
      - developer
      - full stack
      - backend
      - frontend
      - ai
    exclude_keywords:
      - unpaid
      - internship
      - onsite only
    min_score: 2
    require_contract_signal: false
    limit: 10
    notes: Bounded first-party HTML crawl; extracts schema.org JobPosting JSON-LD and obvious application/contact links.
  - name: example-careers-sitemap
    type: public-sitemap
    adapter: sitemap
    enabled: false
    url: https://example.com/sitemap.xml
    default_buyer: Example Company
    max_sitemaps: 5
    url_include_patterns:
      - job
      - jobs
      - career
      - careers
      - contract
      - consultant
    max_pages: 25
    include_keywords:
      - contract
      - consultant
      - software
      - developer
      - full stack
      - ai
    exclude_keywords:
      - unpaid
      - internship
      - onsite only
    min_score: 2
    require_contract_signal: false
    limit: 10
    notes: Bounded sitemap extraction for first-party careers pages.
  - name: linkedin-services
    type: marketplace
    enabled: false
    url: https://www.linkedin.com/services/
    notes: Enable only after login and source policy are configured.
  - name: upwork
    type: marketplace
    enabled: false
    url: https://www.upwork.com/nx/search/jobs/
    notes: Check platform terms and client profile before automated submissions.
  - name: sam-gov
    type: public-procurement
    enabled: false
    url: https://sam.gov/search/
    notes: Government opportunities usually require manual legal/compliance review.
