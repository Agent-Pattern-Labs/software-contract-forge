# generated by @razroo/iso-route — do not hand-edit
model = "gpt-5.4"
model_provider = "openai"

[profiles.fast]
model = "gpt-5.4-mini"
model_provider = "openai"

[profiles.quality]
model = "gpt-5.4"
model_provider = "openai"
model_reasoning_effort = "high"

[profiles.minimal]
model = "gpt-5.4-nano"
model_provider = "openai"

[mcp_servers.geometra]
command = "npx"
args = ["-y", "@geometra/mcp@1.61.3"]

[mcp_servers.gmail]
command = "npx"
args = ["-y", "@razroo/gmail-mcp"]
env = { DISABLE_HTTP = "true" }

[mcp_servers.state-trace]
command = "state-trace-mcp"
env = { STATE_TRACE_STORAGE_PATH = ".state-trace/memory.db", STATE_TRACE_NAMESPACE = "software-contract-forge", STATE_TRACE_CAPACITY_LIMIT = "256" }
